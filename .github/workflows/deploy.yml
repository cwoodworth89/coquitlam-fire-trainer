name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./client

      - name: Build
        run: npm run build
        working-directory: ./client

      - name: Ensure GitHub Pages is enabled
        run: |
          echo "Configuring GitHub Pages to deploy from gh-pages..."
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}')
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $http_code"
          echo "$body"
          if [ "$http_code" -ge 400 ]; then
            echo "⚠️ Could not enable Pages automatically (HTTP $http_code)." \
                 "Please enable GitHub Pages in your repo settings (branch 'gh-pages')."
          fi

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        continue-on-error: true
        with:
          folder: client/dist
          branch: gh-pages
